<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding Widget</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background: transparent;
        font-family: "Instrument Sans", "Inter", -apple-system, sans-serif;
      }

      /* ── WIDGET CONTAINER ─────────────────────────── */
      .widget {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      /* ── PANEL ────────────────────────────────────── */
      .panel {
        width: 320px;
        background: #fff;
        border-radius: 16px;
        box-shadow:
          0 8px 32px rgba(4, 107, 210, 0.15),
          0 2px 8px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(4, 107, 210, 0.12);
        overflow: hidden;
        transform-origin: bottom right;
        transition:
          transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.22s ease;
        transform: scale(1) translateY(0);
        opacity: 1;
      }

      .panel.hidden {
        transform: scale(0.85) translateY(12px);
        opacity: 0;
        pointer-events: none;
      }

      /* ── PANEL HEADER ─────────────────────────────── */
      .panel-header {
        background: #046bd2;
        padding: 16px 18px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .header-text {
        flex: 1;
      }

      .header-eyebrow {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
        margin-bottom: 3px;
      }

      .header-title {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
      }

      .close-btn {
        background: rgba(255, 255, 255, 0.18);
        border: none;
        border-radius: 8px;
        width: 28px;
        height: 28px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        flex-shrink: 0;
        transition: background 0.15s ease;
        margin-top: 1px;
      }

      .close-btn:hover {
        background: rgba(255, 255, 255, 0.28);
      }

      .close-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ── PANEL BODY ───────────────────────────────── */
      .panel-body {
        padding: 16px 18px 18px;
      }

      .panel-desc {
        font-size: 13px;
        color: #555;
        line-height: 1.55;
        margin-bottom: 14px;
      }

      /* ── FORM LINKS ───────────────────────────────── */
      .form-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 14px;
        background: #f4f8fd;
        border: 1px solid rgba(4, 107, 210, 0.12);
        border-radius: 10px;
        text-decoration: none;
        color: #0a2540;
        font-size: 13px;
        font-weight: 600;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          transform 0.12s ease;
        cursor: pointer;
      }

      .form-link:hover {
        background: #e8f1fc;
        border-color: rgba(4, 107, 210, 0.28);
        transform: translateX(-2px);
      }

      .form-link:active {
        transform: translateX(0);
      }

      .form-icon {
        width: 30px;
        height: 30px;
        background: #046bd2;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .form-icon svg {
        width: 15px;
        height: 15px;
        color: #fff;
      }

      .form-label {
        flex: 1;
        line-height: 1.2;
      }

      .form-arrow {
        color: #046bd2;
        opacity: 0.6;
        flex-shrink: 0;
        transition: opacity 0.15s ease;
      }

      .form-link:hover .form-arrow {
        opacity: 1;
      }

      /* ── DISMISS LINK ─────────────────────────────── */
      .dismiss-area {
        text-align: center;
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #f0f0f0;
      }

      .dismiss-link {
        font-size: 11.5px;
        color: #999;
        cursor: pointer;
        background: none;
        border: none;
        font-family: inherit;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s ease;
      }

      .dismiss-link:hover {
        color: #555;
      }

      /* ── TOGGLE BUTTON ────────────────────────────── */
      .toggle-btn {
        background: #046bd2;
        border: none;
        border-radius: 50px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 9px;
        cursor: pointer;
        box-shadow:
          0 4px 18px rgba(4, 107, 210, 0.4),
          0 2px 6px rgba(0, 0, 0, 0.12);
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
        color: #fff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
      }

      .toggle-btn:hover {
        transform: translateY(-2px);
        box-shadow:
          0 6px 22px rgba(4, 107, 210, 0.48),
          0 2px 8px rgba(0, 0, 0, 0.14);
      }

      .toggle-btn:active {
        transform: translateY(0);
      }

      .toggle-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .toggle-label {
        white-space: nowrap;
      }

      /* ── PULSE DOT ────────────────────────────────── */
      .pulse-dot {
        width: 8px;
        height: 8px;
        background: #fff;
        border-radius: 50%;
        position: relative;
        flex-shrink: 0;
      }

      .pulse-dot::after {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.55);
        animation: pulse-ring 2s ease-out infinite;
      }

      @keyframes pulse-ring {
        0% {
          transform: scale(0.85);
          opacity: 1;
        }
        70% {
          transform: scale(1.5);
          opacity: 0;
        }
        100% {
          transform: scale(0.85);
          opacity: 0;
        }
      }

      /* ── MOBILE ───────────────────────────────────── */
      @media (max-width: 480px) {
        .widget {
          bottom: 16px;
          right: 16px;
          left: 16px;
          align-items: stretch;
        }

        .panel {
          width: 100%;
        }

        .toggle-btn {
          align-self: flex-end;
        }
      }
    </style>
  </head>
  <body>

    <div class="widget" id="widget">
      <!-- Expanded Panel -->
      <div class="panel" id="panel">
        <div class="panel-header">
          <div class="header-text">
            <div class="header-eyebrow">Purchased multiple services?</div>
            <div class="header-title">Complete your other onboarding forms</div>
          </div>
          <button class="close-btn" id="collapseBtn" aria-label="Minimize">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
          </button>
        </div>

        <div class="panel-body">
          <p class="panel-desc">
            If you purchased additional services, use the links below to complete the rest of your setup now. If not, you're all set!
          </p>

          <div class="form-list">
            <!-- Website Onboarding -->
            <a class="form-link" href="https://nilsdigital.com/website-onboarding" target="_blank" rel="noopener">
              <div class="form-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="2" y1="12" x2="22" y2="12"></line>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
              </div>
              <span class="form-label">Website Onboarding</span>
              <svg class="form-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </a>

            <!-- Pipeline Automations -->
            <a class="form-link" href="https://nilsdigital.com/pipeline-automations" target="_blank" rel="noopener">
              <div class="form-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
              </div>
              <span class="form-label">Pipeline Automations</span>
              <svg class="form-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </a>

            <!-- A2P Phone Number Registration -->
            <a class="form-link" href="https://nilsdigital.com/phone-number-setup" target="_blank" rel="noopener">
              <div class="form-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.4 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 5.49 5.49l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </div>
              <span class="form-label">A2P Phone Number Registration</span>
              <svg class="form-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </a>

            <!-- Google Ads -->
            <a class="form-link" href="https://nilsdigital.com/google-ads-setup" target="_blank" rel="noopener">
              <div class="form-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </div>
              <span class="form-label">Google Ads Setup</span>
              <svg class="form-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </a>
          </div>

          <div class="dismiss-area">
            <button class="dismiss-link" id="dismissBtn">I don't need any other forms &mdash; dismiss</button>
          </div>
        </div>
      </div>

      <!-- Collapsed Toggle Button -->
      <button class="toggle-btn" id="toggleBtn" style="display:none;" aria-label="Open onboarding forms">
        <div class="pulse-dot"></div>
        <span class="toggle-label">Did you purchase multiple services? Complete your onboarding here</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
    </div>

    <script>
      const panel = document.getElementById("panel");
      const toggleBtn = document.getElementById("toggleBtn");
      const collapseBtn = document.getElementById("collapseBtn");
      const dismissBtn = document.getElementById("dismissBtn");
      const widget = document.getElementById("widget");

      // Collapse panel, show toggle button
      collapseBtn.addEventListener("click", () => {
        panel.classList.add("hidden");
        setTimeout(() => {
          panel.style.display = "none";
          toggleBtn.style.display = "flex";
        }, 280);
      });

      // Re-open panel
      toggleBtn.addEventListener("click", () => {
        toggleBtn.style.display = "none";
        panel.style.display = "";
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            panel.classList.remove("hidden");
          });
        });
      });

      // Dismiss collapses to bubble (same as minimize)
      dismissBtn.addEventListener("click", () => {
        panel.classList.add("hidden");
        setTimeout(() => {
          panel.style.display = "none";
          toggleBtn.style.display = "flex";
        }, 280);
      });

      // Auto-open after short delay for a polished feel
      panel.classList.add("hidden");
      setTimeout(() => {
        panel.classList.remove("hidden");
      }, 800);
    </script>
  </body>
</html>
